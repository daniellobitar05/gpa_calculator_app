name: university_app_project
description: A professional Flutter + SQLite university app with login

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  sqflite_common_ffi: 2.3.0+4
  sqlite3: 2.4.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.4
  path: ^1.9.0
  ffi: ^2.1.2
  provider: ^6.1.2
  image_picker: ^1.1.2
  flutter_slidable: ^3.1.1
  percent_indicator: ^4.2.3
  shared_preferences: ^2.3.2
  fl_chart: ^0.69.0
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true